version: '3'

services:
  bk:
    image: openvino/model_server
    container_name: bk
    command: --model_name bk --model_path /models/bk --port 9000
    volumes:
      - ./models:/models
  bkapi:
    image: hieupth/textembserve
    container_name: bkapi
    environment:
      - TOKENIZER=phobert
      - IS_WORD_SEGMENT=True
      - OVMS_URI="bk:9000"
      - MODEL_NAME=/tokenizer
    ports:
      - 80:80
    volumes:
      - ./tokenizer:/tokenizer
    links:
      - bk:bk